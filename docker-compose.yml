services:

  mysql:
    image: mysql:8.0
    container_name: systeme-gestion-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: systeme_gestion_db
      MYSQL_USER: systeme_user
      MYSQL_PASSWORD: systeme_password
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    restart: unless-stopped
    networks:
      - systeme-network


  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: systeme-gestion-api
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/systeme_gestion_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: systeme_user
      SPRING_DATASOURCE_PASSWORD: systeme_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
      SERVER_PORT: 8080
    ports:
      - "18080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - systeme-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api || curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: systeme-gestion-frontend
    ports:
      - "4200:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - systeme-network

volumes:
  mysql-data:

networks:
  systeme-network:
    driver: bridge
