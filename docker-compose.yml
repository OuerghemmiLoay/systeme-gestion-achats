version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: systeme-gestion-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: systeme_gestion_db
      MYSQL_USER: systeme_user
      MYSQL_PASSWORD: systeme_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - systeme-network

  # Spring Boot API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: systeme-gestion-api
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/systeme_gestion_db?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: systeme_user
      SPRING_DATASOURCE_PASSWORD: systeme_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - systeme-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/swagger-ui.html"]
      timeout: 10s
      retries: 5
      start_period: 40s

  # Optional: Nginx for Angular front-end (comment out if not using)
  # nginx:
  #   image: nginx:alpine
  #   container_name: systeme-gestion-frontend
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./frontend/dist:/usr/share/nginx/html
  #     - ./nginx.conf:/etc/nginx/nginx.conf
  #   depends_on:
  #     - api
  #   networks:
  #     - systeme-network

volumes:
  mysql-data:

networks:
  systeme-network:
    driver: bridge
